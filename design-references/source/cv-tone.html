// ─── CROSSFADE TEXT ───────────────────────────────────────────────────────
function CrossfadeText({ value, as = "span", style }) {
  const [shown, setShown] = useState(value);
  const [out, setOut] = useState(false);
  const tRef = useRef(null);
  useEffect(() => {
    if (value === shown) return;
    const reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduced) { setShown(value); return; }
    setOut(true);
    clearTimeout(tRef.current);
    tRef.current = setTimeout(() => {
      setShown(value);
      // Force reflow then fade in
      requestAnimationFrame(() => setOut(false));
    }, 280);
    return () => clearTimeout(tRef.current);
  }, [value]);
  const Comp = as;
  return <Comp className={`crossfade ${out ? "is-out" : ""}`} style={style}>{shown}</Comp>;
}

      }}>
        <h3 style={{
          fontFamily: "var(--font-display)", fontSize: "1.2rem",
          fontWeight: 600, color: "var(--fg)", margin: 0, lineHeight: 1.2,
        }}>
          {entry.role}<span style={{ color: "var(--muted)", fontWeight: 400 }}> — {entry.org}</span>
        </h3>
        <span style={{
          fontFamily: "var(--font-mono)", fontSize: "0.78rem",
          letterSpacing: "0.14em", textTransform: "uppercase", color: "var(--muted)",
          whiteSpace: "nowrap", fontVariantNumeric: "tabular-nums",
        }}>{entry.period}</span>
      </div>

      <p style={{ maxWidth: "72ch", marginBottom: "0.85rem", textWrap: "pretty" }}>
        <CrossfadeText value={blurb} />
      </p>

      <ul style={{
        listStyle: "none", margin: 0, padding: 0,
        display: "flex", flexDirection: "column", gap: "0.85rem",
      }}>
        {bullets.map((b, i) => <Bullet key={`${tone}-${i}`} text={b} />)}
      </ul>

      <div style={{
        marginTop: "1rem", paddingLeft: "1.4rem",
        fontFamily: "var(--font-mono)", fontSize: "0.78rem",
        letterSpacing: "0.06em", color: "var(--muted)",
      }}>
        <span style={{ color: "var(--fg)", marginRight: "0.5rem", textTransform: "uppercase", letterSpacing: "0.2em" }}>Stack /</span>
        {entry.tech}
      </div>
    </article>
  );
}

// Simplified slider deck — context, not the focus
function MiniDeck() {
  return (
    <div style={{
      background: "#16140f",
      color: "#f4f1ea",
      borderRadius: 12,
      padding: "12px 14px",
      fontFamily: "'Space Grotesk', sans-serif",
      display: "flex", flexDirection: "column", gap: 10,
      boxShadow: "0 18px 40px -16px rgba(0,0,0,0.4)",
    }}>
      <div style={{
        display: "flex", justifyContent: "space-between", alignItems: "center",
        fontFamily: "var(--font-mono)", fontSize: 9, letterSpacing: "0.28em",
        textTransform: "uppercase", color: "rgba(244,241,234,0.5)",
      }}>
        <span>CV / RETHEME</span>
        <span style={{ color: "#d4ff3a" }}>● BALANCED</span>
      </div>
      {[
        ["DENSITY", "sparse", "dense", 0.5, "#d4ff3a"],
        ["POLISH", "brutalist", "refined", 0.55, "#ff7a59"],
        ["HIERARCHY", "flat", "dramatic", 0.55, "#7ad7ff"],
        ["MOTION", "static", "kinetic", 0.5, "#ffd166"],
      ].map(([name, l, r, v, accent]) => (
        <div key={name}>
          <div style={{
            display: "flex", justifyContent: "space-between", alignItems: "baseline",
            fontFamily: "var(--font-mono)", fontSize: 9, color: "rgba(244,241,234,0.45)",
            letterSpacing: "0.18em", textTransform: "uppercase", marginBottom: 3,
          }}>
            <span style={{ color: "#f4f1ea", fontWeight: 700, letterSpacing: "0.1em" }}>{name}</span>
            <span style={{ fontVariantNumeric: "tabular-nums", color: accent }}>{v.toFixed(2)}</span>
          </div>
          <div style={{ position: "relative", height: 12 }}>
            <div style={{
              position: "absolute", inset: "3px 0",
              background: "rgba(0,0,0,0.5)", borderRadius: 2,
            }} />
            <div style={{
              position: "absolute", left: 0, top: 3, bottom: 3,
              width: `${v * 100}%`,
              background: accent, borderRadius: "2px 0 0 2px",
              boxShadow: `0 0 8px ${accent}66`,
            }} />
            <div style={{
              position: "absolute", left: `${v * 100}%`, top: 0, bottom: 0,
              width: 6, transform: "translateX(-50%)",
              background: "linear-gradient(180deg, #f8f5ed, #b8b3a6)",
              border: "1px solid rgba(0,0,0,0.5)", borderRadius: 1,
            }} />
          </div>
          <div style={{
            display: "flex", justifyContent: "space-between",
            fontFamily: "var(--font-mono)", fontSize: 8, marginTop: 2,
            color: "rgba(244,241,234,0.35)", letterSpacing: "0.16em", textTransform: "uppercase",
          }}>
            <span>{l}</span><span>{r}</span>
          </div>
        </div>
      ))}
      <div style={{
        fontFamily: "var(--font-mono)", fontSize: 8, letterSpacing: "0.2em",
        textTransform: "uppercase", color: "rgba(244,241,234,0.4)",
        marginTop: 4, paddingTop: 8, borderTop: "1px solid rgba(255,255,255,0.06)",
      }}>
        Live in artifact 1 →
      </div>
    </div>
  );
}

  const isAbsurd = tone === "absurd";

  return (
    <div>
      <SatireBadge visible={isAbsurd} />

      <div style={{
        display: "grid",
        gridTemplateColumns: "minmax(0, 1fr) 320px",
        gap: "clamp(1.5rem, 3vw, 3rem)",
        maxWidth: 1320,
        margin: "0 auto",
        padding: "clamp(1.5rem, 3vw, 2.5rem) clamp(1.25rem, 3vw, 2.5rem) 4rem",
        alignItems: "start",
      }}>
        <main style={{ minWidth: 0 }}>
          {/* Header */}
          <header style={{ paddingBottom: "1.5rem", borderBottom: "1px solid var(--rule)" }}>

              fontFamily: "var(--font-mono)", fontSize: "0.78rem",
              letterSpacing: "0.22em", textTransform: "uppercase",
              color: "var(--muted)", marginBottom: "0.85rem",

              <span>—</span><span>Available for senior IC roles</span>

              fontSize: "clamp(2.4rem, 6vw, 4.2rem)",
              fontWeight: 500, letterSpacing: "-0.025em", lineHeight: 0.95,
              margin: 0, textWrap: "balance",
            }}>{CV.name}</h1>
            <p style={{
              marginTop: "1.25rem", fontSize: "1.2rem", maxWidth: "60ch",
              textWrap: "pretty",
            }}>{CV.tagline}</p>
            <div style={{
              marginTop: "1.25rem", display: "flex", flexWrap: "wrap", gap: "0.5rem 2rem",
              fontFamily: "var(--font-mono)", fontSize: "0.78rem", letterSpacing: "0.06em",
            }}>
              <span><span style={{ color: "var(--muted)" }}>email </span>{CV.email}</span>
              <span><span style={{ color: "var(--muted)" }}>tel </span>{CV.phone}</span>
            </div>
          </header>

          {/* Bio */}
          <Section num="01" title="Personal">
            <div style={{ display: "flex", flexDirection: "column", gap: "0.85rem", maxWidth: "68ch" }}>
              {CV.bio.map((p, i) => (
                <p key={i} style={{
                  textWrap: "pretty",

          </Section>

          {/* Overview */}
          <Section num="02" title="Experience overview">
            <p style={{ maxWidth: "72ch", textWrap: "pretty" }}>{CV.overview}</p>
          </Section>

          {/* Tone toggle — featured above experience */}

            <ToneToggle tone={tone} onChange={setTone} />

          {/* Experience */}
          <Section num="04" title="Experience">

              display: "flex", flexWrap: "wrap", alignItems: "baseline",

              <span style={{
                fontFamily: "var(--font-mono)", fontSize: "0.78rem",

            <ul style={{
              listStyle: "none", margin: 0, padding: 0,

                  <span style={{
                    position: "absolute", left: 0, top: "calc(var(--line) * 0.5em)",

                    transform: "translateY(-50%)",
                  }} />{n}
                </li>
              ))}
            </ul>
          </Section>

          {/* Skills */}
          <Section num="06" title="Skills">

                    letterSpacing: "0.22em", textTransform: "uppercase", color: "var(--muted)",

                  }}>{b.title}</h4>
                  {b.asList ? (
                    <ul style={{ listStyle: "none", margin: 0, padding: 0,
                      display: "flex", flexDirection: "column", gap: "0.45rem" }}>

                        <li key={j} style={{ paddingLeft: "1.1rem", position: "relative" }}>

          <MiniDeck />

      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
