// ─── HELPERS ─────────────────────────────────────────────────────────────
function statusFor(chip, level) {
  if (level === "strict")   return chip.strictStatus   || chip.baseStatus;
  if (level === "generous") return chip.generousStatus || chip.baseStatus;
  return chip.baseStatus;
}
function levelLabel(v) {
  if (v < 0.34) return "strict";
  if (v > 0.66) return "generous";
  return "balanced";
}
function levelToValue(l) { return l === "strict" ? 0.15 : l === "generous" ? 0.85 : 0.5; }

// Bullet citations indexed for reorder ranking.
function rankBullets(role, scoredChips, level) {
  const hitIds = new Set();
  const stretchIds = new Set();
  scoredChips.forEach((c) => {
    const s = statusFor(c, level);
    if (!c.cite) return;
    c.cite.forEach((id) => {
      if (s === "hit") hitIds.add(id);
      else if (s === "stretch" && !hitIds.has(id)) stretchIds.add(id);
    });
  });
  const ranked = role.bullets.map((b, originalIdx) => {
    let rank = 2; // uncited
    if (hitIds.has(b.id)) rank = 0;
    else if (stretchIds.has(b.id)) rank = 1;
    return { ...b, rank, originalIdx };
  });
  return ranked.sort((a, b) => a.rank - b.rank || a.originalIdx - b.originalIdx);
}

      {children}
    </button>
  );
}

function StretchSlider({ value, onChange }) {
  const trackRef = useRef(null);
  const [dragging, setDragging] = useState(false);

  const setFromClientX = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const v = Math.max(0, Math.min(1, (clientX - r.left) / r.width));
    onChange(v);
  };

  useEffect(() => {
    if (!dragging) return;
    const move = (e) => setFromClientX(e.clientX);
    const up   = () => setDragging(false);
    window.addEventListener("mousemove", move);
    window.addEventListener("mouseup", up);
    return () => {
      window.removeEventListener("mousemove", move);
      window.removeEventListener("mouseup", up);
    };
  }, [dragging]);

  const label = levelLabel(value);

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 8, minWidth: 280 }}>
      <div style={{
        display: "flex", justifyContent: "space-between", alignItems: "baseline",
        fontFamily: "var(--font-mono)", fontSize: "0.68rem",
        letterSpacing: "0.22em", textTransform: "uppercase", color: "var(--muted)",
      }}>
        <span>Strict</span>
        <span style={{ color: "var(--accent)", fontWeight: 600 }}>{label}</span>
        <span>Generous</span>
      </div>
      <div
        ref={trackRef}
        className="stretch-track"
        onMouseDown={(e) => { setDragging(true); setFromClientX(e.clientX); }}
      >
        {/* tick marks at thresholds */}
        <div className="stretch-tick" style={{ left: "16.66%" }} />
        <div className="stretch-tick" style={{ left: "50%" }} />
        <div className="stretch-tick" style={{ left: "83.33%" }} />
        {/* ticks labels */}
        <div className="stretch-thumb" style={{ left: `${value * 100}%` }} />
      </div>
      <div style={{
        display: "flex", justifyContent: "space-between",
        fontFamily: "var(--font-mono)", fontSize: "0.62rem",
        letterSpacing: "0.18em", textTransform: "uppercase", color: "var(--muted-2)",
      }}>
        <button onClick={() => onChange(levelToValue("strict"))}
                style={{ background: "none", border: 0, cursor: "pointer", color: "inherit", font: "inherit", letterSpacing: "inherit", textTransform: "inherit" }}>
          ⊢ strict
        </button>
        <button onClick={() => onChange(levelToValue("balanced"))}
                style={{ background: "none", border: 0, cursor: "pointer", color: "inherit", font: "inherit", letterSpacing: "inherit", textTransform: "inherit" }}>
          ⊨ balanced
        </button>
        <button onClick={() => onChange(levelToValue("generous"))}
                style={{ background: "none", border: 0, cursor: "pointer", color: "inherit", font: "inherit", letterSpacing: "inherit", textTransform: "inherit" }}>
          ⊣ generous
        </button>
      </div>
    </div>
  );
}

const STATUS_STYLES = {
  hit:     { fg: "var(--hit)",     bg: "var(--hit-bg)",     border: "var(--hit)",     symbol: "●", label: "Hit" },
  stretch: { fg: "var(--stretch)", bg: "var(--stretch-bg)", border: "var(--stretch)", symbol: "◐", label: "Stretch" },
  miss:    { fg: "var(--muted)",   bg: "var(--miss-bg)",    border: "var(--rule)",    symbol: "○", label: "Miss" },
};

function Chip({ chip, status, idx, onActivate, tweaks, onHoverChange }) {
  const [hover, setHover] = useState(false);
  const [expanded, setExpanded] = useState(false);
  const ref = useRef(null);
  const s = STATUS_STYLES[status];
  const isMiss = status === "miss";
  const isHit  = status === "hit";

  const dense = tweaks.chipDensity === "dense";
  const padY = dense ? 8 : 12;
  const padX = dense ? 11 : 14;
  const radius = tweaks.chipShape === "rounded" ? 8 : tweaks.chipShape === "pill" ? 16 : 0;

  const handleEnter = () => {
    setHover(true);
    if (tweaks.reasoningStyle === "floating" && ref.current) {
      const r = ref.current.getBoundingClientRect();
      onHoverChange({ chip, status, rect: { left: r.left, right: r.right, top: r.top, bottom: r.bottom, width: r.width } });
    }
  };
  const handleLeave = () => {
    setHover(false);
    onHoverChange(null);
  };

  return (
    <div
      ref={ref}
      className="chip chip-in"
      onMouseEnter={handleEnter}
      onMouseLeave={handleLeave}
      style={{
        position: "relative",
        animationDelay: `${idx * 65}ms`,
        background: s.bg,
        border: `1px solid ${s.border}`,
        borderLeftWidth: 3,
        borderRadius: radius,
        padding: `${padY}px ${padX}px ${padY}px ${padX}px`,
        cursor: "pointer",
        display: "flex", flexDirection: "column", gap: dense ? 4 : 6,
        minHeight: 0,
      }}
      onClick={() => {
        if (isHit) onActivate(chip);
        else if (isMiss) setExpanded((e) => !e);
      }}
    >
      <div style={{ display: "flex", alignItems: "baseline", gap: 8, justifyContent: "space-between" }}>
        <span style={{
          fontFamily: "var(--font-mono)", fontSize: "0.62rem",
          letterSpacing: "0.22em", textTransform: "uppercase",
          color: s.fg, fontWeight: 600,
        }}>
          {s.symbol} {s.label}
        </span>
        <span style={{
          fontFamily: "var(--font-mono)", fontSize: "0.62rem",
          color: "var(--muted-2)", letterSpacing: "0.1em",
        }}>{String(idx + 1).padStart(2, "0")}</span>
      </div>
      <div style={{
        fontFamily: "var(--font-display)", fontSize: "1.02rem",
        fontWeight: 500, lineHeight: 1.25,
        color: isMiss ? "var(--muted)" : "var(--fg)",
        textWrap: "balance",
      }}>
        {chip.text}
      </div>

      {/* inline reasoning when tweak is set to inline */}
      {hover && !expanded && tweaks.reasoningStyle === "inline" && (
        <div style={{
          marginTop: 6, paddingTop: 8,
          borderTop: "1px dashed rgba(28,25,21,0.18)",
          fontSize: "0.82rem", lineHeight: 1.5,
          color: "var(--fg-soft)",
          textWrap: "pretty",
        }}>
          <div style={{
            fontFamily: "var(--font-mono)", fontSize: "0.58rem",
            letterSpacing: "0.22em", textTransform: "uppercase",
            color: "var(--muted)", marginBottom: 4,
          }}>
            {isHit ? "Why this is a hit" : status === "stretch" ? "Why this is a stretch" : "Honest gap"}
          </div>
          {chip.reasoning}
        </div>
      )}

      {/* expanded miss framing */}
      {expanded && isMiss && (
        <div style={{
          marginTop: 6, paddingTop: 10,
          borderTop: "1px dashed var(--rule)",
          fontStyle: "italic", color: "var(--fg-soft)",
          fontFamily: "var(--font-display)", fontWeight: 400,
          fontSize: "0.96rem", lineHeight: 1.45,
          textWrap: "pretty",
        }}>
          “{chip.gapFraming || chip.reasoning}”
        </div>
      )}
    </div>
  );
}

function FloatingReasoning({ data }) {
  if (!data) return null;
  const { chip, status, rect } = data;
  const isHit = status === "hit";
  const isMiss = status === "miss";
  const PANEL_W = Math.max(260, Math.min(360, rect.width * 1.1));
  // Prefer below; flip above if no room.
  const spaceBelow = window.innerHeight - rect.bottom;
  const placeAbove = spaceBelow < 180 && rect.top > 200;
  const top = placeAbove ? rect.top - 10 - 160 : rect.bottom + 8;
  let left = rect.left + rect.width / 2 - PANEL_W / 2;
  left = Math.max(12, Math.min(window.innerWidth - PANEL_W - 12, left));
  return (
    <div style={{
      position: "fixed", left, top, width: PANEL_W,
      background: "#1c1915", color: "#f4f1ea",
      padding: "12px 14px",
      fontSize: "0.84rem", lineHeight: 1.5,
      zIndex: 1000,
      boxShadow: "0 18px 40px -10px rgba(28,25,21,0.55)",
      textWrap: "pretty",
      pointerEvents: "none",
    }}>
      <div style={{
        fontFamily: "var(--font-mono)", fontSize: "0.6rem",
        letterSpacing: "0.22em", textTransform: "uppercase",
        color: "rgba(244,241,234,0.55)", marginBottom: 6,
      }}>
        {isHit ? "Why this is a hit" : status === "stretch" ? "Why this is a stretch" : "Honest gap"}
      </div>
      {chip.reasoning}
      {isHit && chip.cite && chip.cite.length > 0 && (
        <div style={{ marginTop: 8, fontFamily: "var(--font-mono)", fontSize: "0.66rem", color: "#d4ff3a", letterSpacing: "0.1em" }}>
          ↳ click to view supporting bullet
        </div>
      )}
      {isMiss && (
        <div style={{ marginTop: 8, fontFamily: "var(--font-mono)", fontSize: "0.66rem", color: "#ffb37a", letterSpacing: "0.1em" }}>
          ↳ click to expand a candid framing
        </div>
      )}
    </div>
  );
}

function ChipGrid({ chips, level, onActivate, tweaks, onHoverChange }) {
  const minW = tweaks.chipDensity === "dense" ? 200 : 240;
  return (
    <div style={{
      display: "grid",
      gridTemplateColumns: `repeat(auto-fill, minmax(${minW}px, 1fr))`,
      gap: "0.75rem",
    }}>
      {chips.map((chip, i) => (
        <Chip key={chip.id} chip={chip} idx={i} status={statusFor(chip, level)} onActivate={onActivate} tweaks={tweaks} onHoverChange={onHoverChange} />
      ))}
    </div>
  );
}

function SummaryLine({ chips, level }) {
  const counts = { hit: 0, stretch: 0, miss: 0 };
  chips.forEach((c) => { counts[statusFor(c, level)]++; });
  const word = (n, s, p) => `${n} ${n === 1 ? s : p}`;
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
      <h3 style={{
        fontFamily: "var(--font-display)", fontWeight: 500,
        fontSize: "clamp(1.6rem, 3vw, 2.2rem)",
        lineHeight: 1.1, margin: 0, letterSpacing: "-0.015em",
        textWrap: "balance",
      }}>
        Reading the JD as written, this CV lands{" "}
        <span style={{ color: "var(--hit)" }}>{word(counts.hit, "hit", "hits")}</span>,{" "}
        <span style={{ color: "var(--stretch)" }}>{word(counts.stretch, "stretch", "stretches")}</span>,{" "}
        and <span style={{ color: "var(--muted)" }}>{word(counts.miss, "honest gap", "honest gaps")}</span>.
      </h3>
      <p style={{
        margin: 0, fontFamily: "var(--font-mono)",
        fontSize: "0.72rem", letterSpacing: "0.16em",
        textTransform: "uppercase", color: "var(--muted)",
      }}>
        Conservative matching — when uncertain, defaults to stretch over hit.
      </p>
    </div>
  );
}

// FLIP reorder for bullets within a role
function BulletList({ role, ordered, pulseId, scoredChipIds, highlightCited }) {
  const itemRefs = useRef({});
  const prevPositions = useRef({});

  useLayoutEffect(() => {
    const reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduced) return;
    Object.entries(itemRefs.current).forEach(([id, el]) => {
      if (!el) return;
      const next = el.getBoundingClientRect();
      const prev = prevPositions.current[id];
      if (prev) {
        const dy = prev.top - next.top;
        if (Math.abs(dy) > 0.5) {
          el.animate(
            [
              { transform: `translateY(${dy}px)` },
              { transform: "translateY(0)" },
            ],
            { duration: 480, easing: "cubic-bezier(.2,.7,.2,1)" }
          );
        }
      }
      prevPositions.current[id] = next;
    });
  });

  return (
    <ul style={{
      listStyle: "none", margin: 0, padding: 0,
      display: "flex", flexDirection: "column", gap: "0.85rem",
    }}>
      {ordered.map((b) => {
        const cited = scoredChipIds.has(b.id) && highlightCited !== false;
        return (
          <li
            key={b.id}
            ref={(el) => { itemRefs.current[b.id] = el; }}
            data-bullet-id={b.id}
            className={pulseId === b.id ? "bullet-pulse" : ""}
            style={{
              paddingLeft: "1.4rem", position: "relative",
              maxWidth: "72ch", textWrap: "pretty",
              padding: "0.25rem 0.4rem 0.25rem 1.4rem",
              borderLeft: cited ? "2px solid var(--accent)" : "2px solid transparent",
              marginLeft: cited ? "-2px" : "0",
              transition: "border-color 320ms",
            }}
          >
            <span style={{
              position: "absolute", left: cited ? "0.2rem" : 0, top: "calc(1.6em * 0.5)",
              width: "0.55rem", height: "1px", background: "var(--fg)",
              transform: "translateY(-50%)",
            }} />
            {b.text}
          </li>
        );
      })}
    </ul>
  );
}

function Role({ role, ordered, pulseId, scoredChipIds, highlightCited }) {

  );
}

      </Section>

      {/* EXPERIENCE */}
      <Section num="03" title="Experience" kicker={scored ? `${reorder ? "reordered by relevance" : "original order"}` : ""}>
        {/* Reorder toggle */}
        {scored && (
          <div style={{
            display: "flex", flexWrap: "wrap", alignItems: "center", gap: "0.85rem 1.25rem",
            padding: "0.85rem 1rem", background: "var(--card-bg)",
            border: "1px solid var(--rule-soft)",
            marginBottom: "1.5rem",
          }}>
            <div className={`switch ${reorder ? "on" : ""}`} onClick={() => setReorder((r) => !r)} role="switch" aria-checked={reorder} />
            <div style={{ display: "flex", flexDirection: "column", gap: 2, flex: 1, minWidth: 200 }}>
              <span style={{
                fontFamily: "var(--font-display)", fontWeight: 500, fontSize: "1rem", lineHeight: 1.2,
              }}>
                {reorder ? "Reordered by relevance to this JD" : "Original order"}
              </span>
              <span style={{
                fontFamily: "var(--font-mono)", fontSize: "0.66rem",
                letterSpacing: "0.16em", textTransform: "uppercase", color: "var(--muted)",
              }}>
                {reorder
                  ? "Hits float up · cited bullets marked"
                  : "The CV as written — the truth, in date order"}
              </span>
            </div>
            {reorder && (
              <button
                onClick={() => setReorder(false)}
                style={{
                  background: "transparent", border: "1px solid var(--rule)",
                  padding: "8px 14px", cursor: "pointer",
                  fontFamily: "var(--font-mono)", fontSize: "0.7rem",
                  letterSpacing: "0.18em", textTransform: "uppercase", color: "var(--fg)",
                }}
              >
                Restore original
              </button>
            )}
          </div>
        )}

        {ROLES.map((r, i) => (
          <Role
            key={r.id}
            role={r}
            ordered={orderedByRole[i]}
            pulseId={pulseId}
            scoredChipIds={scoredChipIds}
            highlightCited={tweaks.highlightCited}
          />
        ))}
      </Section>

      <footer style={{
        marginTop: "5rem", paddingTop: "2rem",
        borderTop: "1px solid var(--rule)",
        display: "flex", flexWrap: "wrap", gap: "0.75rem 2rem",
        justifyContent: "space-between",
        fontFamily: "var(--font-mono)", fontSize: "0.78rem",
        letterSpacing: "0.18em", textTransform: "uppercase", color: "var(--muted)",
      }}>
        <span>© {CV.name}</span>
        <span>JD adapter — exploratory</span>
        <span>{level} matching</span>
      </footer>

      <FloatingReasoning data={tweaks.reasoningStyle === "floating" ? hoverData : null} />

      {TweaksPanel && (
        <TweaksPanel title="Tweaks">
          <TweakSection title="Chip grid">
            <TweakRadio
              label="Density"
              value={tweaks.chipDensity}
              onChange={(v) => setTweak("chipDensity", v)}
              options={[{value: "comfortable", label: "Comfortable"}, {value: "dense", label: "Dense"}]}
            />
            <TweakRadio
              label="Shape"
              value={tweaks.chipShape}
              onChange={(v) => setTweak("chipShape", v)}
              options={[{value: "square", label: "Square"}, {value: "rounded", label: "Rounded"}, {value: "pill", label: "Pill"}]}
            />
            <TweakSelect
              label="Reasoning placement"
              value={tweaks.reasoningStyle}
              onChange={(v) => setTweak("reasoningStyle", v)}
              options={[
                {value: "floating", label: "Floating tooltip (above other content)"},
                {value: "inline", label: "Inline within chip"},
              ]}
            />
          </TweakSection>
          <TweakSection title="Surface">
            <TweakColor
              label="Accent hue"
              value={tweaks.accent}
              onChange={(v) => setTweak("accent", v)}
            />
            <TweakToggle
              label="Highlight cited bullets"
              value={tweaks.highlightCited}
              onChange={(v) => setTweak("highlightCited", v)}
            />
            <TweakToggle
              label="Show character counter"
              value={tweaks.showCounter}
              onChange={(v) => setTweak("showCounter", v)}
            />
          </TweakSection>
        </TweaksPanel>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
